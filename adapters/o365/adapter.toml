schema = "openape-shapes/v1"

[cli]
id = "o365"
executable = "o365-cli"
audience = "shapes"
version = "2"

# ══════════════════════════════════════════════════════
# AUTH
# ══════════════════════════════════════════════════════

[[operation]]
id = "auth.login"
command = ["auth", "login"]
display = "Login to Microsoft 365 account"
action = "create"
risk = "medium"
resource_chain = ["auth:*"]

[[operation]]
id = "auth.logout"
command = ["auth", "logout"]
positionals = ["email"]
display = "Logout from account {email}"
action = "delete"
risk = "medium"
exact_command = true
resource_chain = ["auth:email={email}"]

[[operation]]
id = "auth.logout-all"
command = ["auth", "logout", "--all"]
display = "Logout from all accounts"
action = "delete"
risk = "high"
exact_command = true
resource_chain = ["auth:*"]

[[operation]]
id = "auth.list"
command = ["auth", "list"]
display = "List logged-in accounts"
action = "list"
risk = "low"
resource_chain = ["auth:*"]

[[operation]]
id = "auth.status"
command = ["auth", "status"]
display = "Show auth token status"
action = "read"
risk = "low"
resource_chain = ["auth:*"]

# ══════════════════════════════════════════════════════
# MAIL — Read Operations
# ══════════════════════════════════════════════════════

[[operation]]
id = "mail.list"
command = ["mail", "list"]
display = "List emails (all accounts)"
action = "list"
risk = "low"
resource_chain = ["account:email=*", "mail:*"]

[[operation]]
id = "mail.read"
command = ["mail", "read"]
positionals = ["message_id"]
required_options = ["account"]
display = "Read email {message_id} from account {account}"
action = "read"
risk = "low"
resource_chain = ["account:email={account}", "mail:id={message_id}"]

[[operation]]
id = "mail.search"
command = ["mail", "search"]
display = "Search emails (all accounts)"
action = "search"
risk = "low"
resource_chain = ["account:email=*", "mail:*"]

[[operation]]
id = "mail.query"
command = ["mail", "query"]
positionals = ["search_text"]
display = "Search emails via KQL: {search_text}"
action = "search"
risk = "low"
resource_chain = ["account:email=*", "mail:*"]

[[operation]]
id = "mail.attachments"
command = ["mail", "attachments"]
positionals = ["message_id"]
required_options = ["account"]
display = "Download attachments from email {message_id}"
action = "read"
risk = "low"
resource_chain = ["account:email={account}", "mail:id={message_id}"]

# ══════════════════════════════════════════════════════
# MAIL — Edit Operations
# ══════════════════════════════════════════════════════

[[operation]]
id = "mail.mark-read"
command = ["mail", "mark-read"]
positionals = ["message_id"]
required_options = ["account"]
display = "Mark email {message_id} as read"
action = "edit"
risk = "medium"
resource_chain = ["account:email={account}", "mail:id={message_id}"]

[[operation]]
id = "mail.mark-unread"
command = ["mail", "mark-unread"]
positionals = ["message_id"]
required_options = ["account"]
display = "Mark email {message_id} as unread"
action = "edit"
risk = "medium"
resource_chain = ["account:email={account}", "mail:id={message_id}"]

[[operation]]
id = "mail.move"
command = ["mail", "move"]
positionals = ["message_id"]
required_options = ["account", "to"]
display = "Move email {message_id} to folder {to}"
action = "edit"
risk = "medium"
exact_command = true
resource_chain = ["account:email={account}", "mail:id={message_id}"]

[[operation]]
id = "mail.trash"
command = ["mail", "trash"]
positionals = ["message_id"]
required_options = ["account"]
display = "Trash email {message_id}"
action = "delete"
risk = "high"
exact_command = true
resource_chain = ["account:email={account}", "mail:id={message_id}"]

[[operation]]
id = "mail.archive-from"
command = ["mail", "archive-from"]
positionals = ["email_addresses"]
required_options = ["account"]
display = "Archive all emails from {email_addresses}"
action = "edit"
risk = "high"
exact_command = true
resource_chain = ["account:email={account}", "mail:*"]

# ══════════════════════════════════════════════════════
# MAIL — Send Operations
# ══════════════════════════════════════════════════════

[[operation]]
id = "mail.send"
command = ["mail", "send"]
required_options = ["account", "to", "subject", "body"]
display = "Send email to {to} from {account}"
action = "send"
risk = "high"
exact_command = true
resource_chain = ["account:email={account}", "mail:*"]

[[operation]]
id = "mail.reply"
command = ["mail", "reply"]
positionals = ["message_id"]
required_options = ["account"]
display = "Reply to email {message_id} from {account}"
action = "send"
risk = "high"
exact_command = true
resource_chain = ["account:email={account}", "mail:id={message_id}"]

[[operation]]
id = "mail.forward"
command = ["mail", "forward"]
positionals = ["message_id"]
required_options = ["account", "to"]
display = "Forward email {message_id} to {to} from {account}"
action = "send"
risk = "high"
exact_command = true
resource_chain = ["account:email={account}", "mail:id={message_id}"]

