# ══════════════════════════════════════════════════════
# RUNS (CI/CD)
# ══════════════════════════════════════════════════════

[[operation]]
id = "run.list"
command = ["run", "list"]
required_options = ["repo"]
display = "List workflow runs in {repo}"
action = "list"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "run:*"]

[[operation]]
id = "run.view"
command = ["run", "view"]
positionals = ["run_id"]
required_options = ["repo"]
display = "View run {run_id} in {repo}"
action = "read"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "run:id={run_id}"]

[[operation]]
id = "run.rerun"
command = ["run", "rerun"]
positionals = ["run_id"]
required_options = ["repo"]
display = "Rerun workflow {run_id} in {repo}"
action = "edit"
risk = "medium"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "run:id={run_id}"]

