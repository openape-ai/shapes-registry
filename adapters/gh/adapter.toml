schema = "openape-shapes/v1"

[cli]
id = "gh"
executable = "gh"
audience = "shapes"
version = "1"

# ══════════════════════════════════════════════════════
# REPO — Read Operations
# ══════════════════════════════════════════════════════

[[operation]]
id = "repo.list"
command = ["repo", "list"]
positionals = ["owner"]
display = "List repositories for owner {owner}"
action = "list"
risk = "low"
resource_chain = ["owner:login={owner}", "repo:*"]

[[operation]]
id = "repo.view"
command = ["repo", "view"]
positionals = ["repo"]
display = "View repository {repo}"
action = "read"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}"]

[[operation]]
id = "repo.clone"
command = ["repo", "clone"]
positionals = ["repo"]
display = "Clone repository {repo}"
action = "read"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}"]

# ══════════════════════════════════════════════════════
# REPO — Write Operations
# ══════════════════════════════════════════════════════

[[operation]]
id = "repo.create"
command = ["repo", "create"]
positionals = ["name"]
display = "Create repository {name}"
action = "create"
risk = "high"
exact_command = true
resource_chain = ["repo:name={name}"]

[[operation]]
id = "repo.rename"
command = ["repo", "rename"]
positionals = ["new_name"]
required_options = ["repo"]
display = "Rename repository {repo} to {new_name}"
action = "rename"
risk = "high"
exact_command = true
resource_chain = ["repo:owner={repo|owner},name={repo|name}"]

[[operation]]
id = "repo.delete"
command = ["repo", "delete"]
positionals = ["repo"]
display = "Delete repository {repo}"
action = "delete"
risk = "critical"
exact_command = true
resource_chain = ["repo:owner={repo|owner},name={repo|name}"]

# ══════════════════════════════════════════════════════
# ISSUES
# ══════════════════════════════════════════════════════

[[operation]]
id = "issue.list"
command = ["issue", "list"]
required_options = ["repo"]
display = "List issues in {repo}"
action = "list"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "issue:*"]

[[operation]]
id = "issue.view"
command = ["issue", "view"]
positionals = ["number"]
required_options = ["repo"]
display = "View issue #{number} in {repo}"
action = "read"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "issue:number={number}"]

[[operation]]
id = "issue.create"
command = ["issue", "create"]
required_options = ["repo", "title"]
display = "Create issue in {repo}: {title}"
action = "create"
risk = "medium"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "issue:*"]

[[operation]]
id = "issue.close"
command = ["issue", "close"]
positionals = ["number"]
required_options = ["repo"]
display = "Close issue #{number} in {repo}"
action = "edit"
risk = "medium"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "issue:number={number}"]

[[operation]]
id = "issue.comment"
command = ["issue", "comment"]
positionals = ["number"]
required_options = ["repo", "body"]
display = "Comment on issue #{number} in {repo}"
action = "create"
risk = "medium"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "issue:number={number}", "comment:*"]

