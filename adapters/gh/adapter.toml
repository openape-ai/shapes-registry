schema = "openape-shapes/v1"

[cli]
id = "gh"
executable = "gh"
audience = "shapes"
version = "1"

[[operation]]
id = "repo.list"
command = ["repo", "list"]
positionals = ["owner"]
display = "List repositories for owner {owner}"
action = "list"
risk = "low"
resource_chain = ["owner:login={owner}", "repo:*"]

[[operation]]
id = "repo.view"
command = ["repo", "view"]
required_options = ["repo"]
display = "Read repository {repo}"
action = "read"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}"]

[[operation]]
id = "issue.list"
command = ["issue", "list"]
required_options = ["repo"]
display = "List issues in repository {repo}"
action = "list"
risk = "low"
resource_chain = ["repo:owner={repo|owner},name={repo|name}", "issue:*"]

[[operation]]
id = "repo.rename"
command = ["repo", "rename"]
positionals = ["new_name"]
required_options = ["repo"]
display = "Rename repository {repo} to {new_name}"
action = "rename"
risk = "high"
exact_command = true
resource_chain = ["repo:owner={repo|owner},name={repo|name}"]
