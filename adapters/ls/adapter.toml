schema = "openape-shapes/v1"

[cli]
id = "ls"
executable = "ls"
audience = "shapes"
version = "1"

[[operation]]
id = "ls.list"
command = []
positionals = ["path"]
display = "List directory contents of {path}"
action = "list"
risk = "low"
resource_chain = ["filesystem:path={path}"]

[[operation]]
id = "ls.list-long"
command = ["-l"]
positionals = ["path"]
display = "List directory contents (detailed) of {path}"
action = "list"
risk = "low"
resource_chain = ["filesystem:path={path}"]

[[operation]]
id = "ls.list-all"
command = ["-la"]
positionals = ["path"]
display = "List all files (including hidden) in {path}"
action = "list"
risk = "low"
resource_chain = ["filesystem:path={path}"]
