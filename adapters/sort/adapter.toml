schema = "openape-shapes/v1"

[cli]
id = "sort"
executable = "sort"
audience = "shapes"
version = "1"

[[operation]]
id = "sort.sort"
command = []
positionals = ["path"]
display = "Sort lines of {path}"
action = "read"
risk = "low"
resource_chain = ["filesystem:path={path}"]

[[operation]]
id = "sort.sort-reverse"
command = ["-r"]
positionals = ["path"]
display = "Sort lines of {path} in reverse"
action = "read"
risk = "low"
resource_chain = ["filesystem:path={path}"]

[[operation]]
id = "sort.sort-numeric"
command = ["-n"]
positionals = ["path"]
display = "Sort lines of {path} numerically"
action = "read"
risk = "low"
resource_chain = ["filesystem:path={path}"]
